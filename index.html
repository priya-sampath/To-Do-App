<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Income Expense Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-primary: "Rowdies", sans-serif;
      }
    </style>

    <script src="./script.js" defer></script>
  </head>
  <body
    class="font-primary min-h-screen bg-linear-to-b from-[rgb(165,177,228)] to-[rgba(118,75,162,1)]"
  >
    <section
      class="max-w-7xl bg-white mx-auto rounded-2xl min-h-[90vh]"
      style="font-family: 'Rowdies', sans-serif"
    >
      <h1 class="text-3xl text-center pt-5 font-bold">
        Income Expense Calculator
      </h1>
      <div class="flex md:flex-row flex-col w-[90%] gap-5 mx-auto my-5">
        <div
          class="sm:w-[28%] md:w-200 h-30 bg-linear-to-r from-[rgb(34,67,214)] to-[rgba(118,75,162,1)] hover:-translate-y-2 cursor-pointer transition-all duration-300 ease-in-out rounded-2xl text-center text-[#26f1b5] flex flex-col items-center justify-center text-2xl"
        >
          <div class="mb-3">
            <span class="p-3">💰</span><span class="ml-3">Total Income</span>
          </div>
          <div id="total-income">₹0.00</div>
        </div>
        <div
          class="sm:w-[28%] md:w-200 h-30 bg-linear-to-r from-[rgb(34,67,214)] to-[rgba(118,75,162,1)] rounded-2xl drop-shadow-3xl hover:-translate-y-2 cursor-pointer transition-all duration-300 ease-in-out text-center text-[#f46565] flex flex-col items-center justify-center text-2xl"
        >
          <p class="mb-3">
            <span>💸</span><span class="ml-3">Total Expense</span>
          </p>
          <p><span id="total-expense">₹0.00</span></p>
        </div>
        <div
          class="sm:w-[28%] md:w-200 h-30 bg-linear-to-r from-[rgb(34,67,214)] to-[rgba(118,75,162,1)] rounded-2xl drop-shadow-lg hover:-translate-y-2 cursor-pointer transition-all duration-300 ease-in-out text-[#eded0d] text-center flex flex-col items-center justify-center text-2xl"
        >
          <p class="mb-3">
            <span>📊</span><span class="ml-3">Net Balance</span>
          </p>
          <p id="net-balance">₹0.00</p>
        </div>
      </div>
      <div class="flex flex-wrap lg:flex-nowrap gap-8 mx-5 my-5">
        <div class="w-full lg:w-1/3">
          <div
            class="bg-linear-to-bl from-[rgb(34,67,214)] to-[rgba(118,75,162,1)] backdrop-blur-lg rounded-3xl p-8 border border-white/10 hover:transform hover:-translate-y-1 transition-all duration-300 shadow-sm"
          >
            <h2 class="text-2xl font-medium text-center text-white mb-6">
              Add Transaction
            </h2>

            <div class="flex flex-col gap-6">
              <form onsubmit="postData(); return false">
                <div class="mt-3">
                  <label
                    class="block text-md tracking-wider uppercase text-white mb-3 font-medium"
                  >
                    Description
                  </label>
                  <input
                    type="text"
                    id="description"
                    placeholder="e.g., Monthly Salary, Groceries"
                    required
                    class="w-full px-4 py-3 border-2 border-white/10 rounded-xl text-white placeholder-gray-300 focus:outline-none"
                  />
                </div>

                <div class="mt-3">
                  <label
                    class="block text-md tracking-wider uppercase text-white mb-3 font-medium"
                  >
                    Amount (₹)
                  </label>
                  <input
                    type="number"
                    id="amount"
                    placeholder="0.00"
                    min="0"
                    required
                    class="w-full px-4 py-3 border-2 border-white/10 rounded-xl text-white placeholder-gray-300 focus:outline-none"
                  />
                </div>

                <div class="mt-3">
                  <label
                    class="block text-md tracking-wider uppercase text-white mb-3 font-medium"
                  >
                    Type
                  </label>
                  <div class="flex gap-4">
                    <label class="flex-1 relative cursor-pointer">
                      <input
                        type="radio"
                        name="type"
                        value="income"
                        id="type-income"
                        checked
                        class="sr-only peer"
                      />
                      <div
                        class="px-4 py-3 border-2 rounded-xl text-center text-gray-400 peer-checked:bg-[#ad09ed] peer-checked:border-purple-500 peer-checked:text-white tracking-wider hover:-translate-y-1 transition-all duration-300 font-medium"
                      >
                        💰 Income
                      </div>
                    </label>
                    <label class="flex-1 relative cursor-pointer">
                      <input
                        type="radio"
                        name="type"
                        value="expense"
                        id="type-expense"
                        class="sr-only peer"
                      />
                      <div
                        class="px-4 py-3 border-2 rounded-xl text-center text-gray-400 peer-checked:bg-[#ad09ed] peer-checked:border-purple-500 peer-checked:text-white hover:-translate-y-1 transition-all duration-300 font-medium"
                      >
                        💸 Expense
                      </div>
                    </label>
                  </div>
                </div>

                <div class="flex gap-4 pt-4">
                  <button
                    id="submitBtn"
                    class="flex-1 px-6 py-3 bg-linear-to-r from-[rgb(62,15,234)] to-[#06c1ef] text-white rounded-xl font-normal cursor-pointer hover:-translate-y-2 hover:shadow-md transition-all duration-300 tracking-wider text-md"
                  >
                    Add Data
                  </button>
                  <button
                    id="resetBtn"
                    class="flex-1 px-6 py-3 bg-linear-to-r from-[rgb(62,15,234)] to-[#06c1ef] text-white rounded-xl font-normal hover:-translate-y-2 cursor-pointer transition-all duration-300 tracking-wider text-md"
                    onclick="resetAll()"
                  >
                    Reset
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
        <div class="w-full lg:flex-1">
          <div
            class="bg-linear-to-bl from-[rgb(34,67,214)] to-[rgba(118,75,162,1)] backdrop-blur-lg rounded-3xl p-8 border border-white/10 hover:transform hover:-translate-y-1 transition-all duration-300 shadow-sm"
          >
            <h2 class="text-2xl font-medium text-center text-white mb-6">
              Transaction History
            </h2>
            <div class="mb-6">
              <label
                class="block text-lg text-white tracking-wider mb-3 font-medium"
              >
                Filter by
              </label>
              <div class="flex flex-wrap gap-3">
                <label class="relative cursor-pointer" onchange="showData()">
                  <input
                    type="radio"
                    name="filter"
                    value="all"
                    checked
                    class="sr-only peer"
                  />
                  <div
                    class="px-4 py-3 border-2 rounded-xl text-center text-gray-400 peer-checked:bg-[#ad09ed] peer-checked:border-purple-500 peer-checked:text-white tracking-wider hover:-translate-y-1 transition-all duration-300 font-medium"
                  >
                    All
                  </div>
                </label>
                <label class="relative cursor-pointer" onchange="showData()">
                  <input
                    type="radio"
                    name="filter"
                    value="income"
                    class="sr-only peer"
                  />
                  <div
                    class="px-4 py-3 border-2 rounded-xl text-center text-gray-400 peer-checked:bg-[#ad09ed] peer-checked:border-purple-500 peer-checked:text-white tracking-wider hover:-translate-y-1 transition-all duration-300 font-medium"
                  >
                    Income
                  </div>
                </label>
                <label class="relative cursor-pointer" onchange="showData()">
                  <input
                    type="radio"
                    name="filter"
                    value="expense"
                    class="sr-only peer"
                  />
                  <div
                    class="px-4 py-3 border-2 rounded-xl text-center text-gray-400 peer-checked:bg-[#ad09ed] peer-checked:border-purple-500 peer-checked:text-white tracking-wider hover:-translate-y-1 transition-all duration-300 font-medium"
                  >
                    Expense
                  </div>
                </label>
              </div>
            </div>
            <div
              id="data-list"
              class="flex flex-col gap-4 max-h-80 overflow-y-auto pr-2 custom-scrollbar"
            ></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
